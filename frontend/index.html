<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canopticon</title>
  <link rel="icon" href="/frontend/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/frontend/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/frontend/assets/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/frontend/assets/favicon-180.png">
  <link rel="stylesheet" href="/frontend/vendor/leaflet.css">
  <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash-center">
      <img class="splash-logo" src="/frontend/assets/canopticon-logo.png" alt="">
      <div class="splash-wordmark">Canopticon</div>
    </div>
    <div class="splash-signoff" id="splashSignoff" data-text="Seglectic Systems"></div>
  </div>
  <header class="topbar">
    <div class="brand">
      <img src="/frontend/assets/canopticon-logo.png" alt="">
      <h1>Canopticon</h1>
    </div>
  </header>

  <main>
    <section class="gallery view active" id="gallery"></section>
    <section class="map-view view" id="mapView">
      <div id="map"></div>
      <div class="map-empty" id="mapEmpty">Photos with GPS metadata will appear here.</div>
    </section>
    <section class="empty" id="empty">Add canopy photos to begin.</section>
  </main>

  <dialog class="viewer" id="viewer">
    <button class="viewer-close" id="viewerClose" type="button" aria-label="Close">
      <span class="icon icon-close" aria-hidden="true"></span>
    </button>
    <img id="viewerImage" alt="">
    <div class="viewer-meta">
      <div class="viewer-header">
        <div class="viewer-stat-value" id="viewerStatValue">--</div>
        <div class="viewer-title" id="viewerTitle"></div>
      </div>
      <div class="viewer-footer">
        <div class="viewer-coords" id="viewerCoords"></div>
        <button class="viewer-map-link" id="viewerMapLink" type="button" hidden>Show On Map</button>
      </div>
    </div>
  </dialog>

  <form class="upload-bar" id="uploadForm">
    <button
      class="tray-handle"
      id="trayHandle"
      type="button"
      aria-expanded="true"
      aria-controls="trayPanel"
      aria-label="Collapse controls"
    >
      <span class="tray-grip" aria-hidden="true"></span>
      <span class="tray-label" id="trayLabel">Hide Controls</span>
    </button>
    <div class="tray-panel" id="trayPanel">
      <div class="upload-inner">
        <div class="status disconnected" id="status" role="status" aria-live="polite" aria-label="Live updates connecting">
          <span class="status-icon" aria-hidden="true"></span>
          <span class="sr-only">Live updates connecting</span>
        </div>
        <div class="tabs" role="tablist" aria-label="Views">
          <button class="tab active" id="galleryTab" type="button" role="tab" aria-selected="true">Gallery</button>
          <button class="tab" id="mapTab" type="button" role="tab" aria-selected="false">Map</button>
        </div>
        <label class="upload-button" for="files" title="Add photos">
          <span class="icon icon-add-photo" aria-hidden="true"></span><span>Add Photos</span>
        </label>
        <input id="files" name="files" type="file" accept="image/*" multiple>
      </div>
      <div class="tray-footer">
        <div class="tray-footer-left">
          <div class="map-coords" id="mapCoords"></div>
        </div>
        <div class="queue-note" id="queueNote"></div>
      </div>
    </div>
  </form>

  <script src="/frontend/vendor/leaflet.js"></script>
  <script src="/frontend/vendor/protomaps-leaflet.js"></script>
  <script src="/frontend/app.js"></script>
</body>
</html>
