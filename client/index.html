<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canopticon</title>
  <link rel="icon" href="/client/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/client/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/client/assets/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/client/assets/favicon-180.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/client/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/client/assets/canopticon-logo.png" alt="">
      <h1>Canopticon</h1>
    </div>
    <div class="status" id="status">Connecting...</div>
  </header>

  <main>
    <section class="gallery view active" id="gallery"></section>
    <section class="map-view view" id="mapView">
      <div id="map"></div>
      <div class="map-empty" id="mapEmpty">Photos with GPS metadata will appear here.</div>
    </section>
    <section class="empty" id="empty">Add canopy photos to begin.</section>
  </main>

  <dialog class="viewer" id="viewer">
    <button class="viewer-close" id="viewerClose" type="button" aria-label="Close">x</button>
    <img id="viewerImage" alt="">
    <div class="viewer-meta">
      <div class="viewer-title" id="viewerTitle"></div>
      <div class="viewer-detail" id="viewerDetail"></div>
    </div>
  </dialog>

  <form class="upload-bar" id="uploadForm">
    <div class="upload-inner">
      <div class="tabs" role="tablist" aria-label="Views">
        <button class="tab active" id="galleryTab" type="button" role="tab" aria-selected="true">Gallery</button>
        <button class="tab" id="mapTab" type="button" role="tab" aria-selected="false">Map</button>
      </div>
      <label class="upload-button" for="files" title="Add photos">
        <span aria-hidden="true">+</span><span>Add Photos</span>
      </label>
      <input id="files" name="files" type="file" accept="image/*" multiple>
    </div>
    <div class="queue-note" id="queueNote"></div>
  </form>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/client/app.js"></script>
</body>
</html>
